<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kasir TU - Realtime Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #areaCetak, #areaCetak * { visibility: visible; }
            #areaCetak { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="bg-indigo-600 text-white p-6 rounded-2xl shadow-md mb-6 text-center no-print">
            <h1 class="text-2xl font-bold tracking-wide">Sistem Kasir TU (Cloud Synchronized)</h1>
            <p class="text-indigo-100 text-sm mt-1">Data tersimpan aman di Cloud, Real-time Sinkron Antar Device</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit no-print">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">Input Transaksi</h2>
                <form id="formTransaksi" onsubmit="tambahDataKeCloud(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nama Pembayar</label>
                        <input type="text" id="nama" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Jumlah Uang (Rp)</label>
                        <input type="number" id="jumlah" required min="1" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Keperluan</label>
                        <textarea id="keperluan" required rows="3" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl transition duration-200 shadow-sm cursor-pointer">
                        Kirim ke Cloud
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex flex-col justify-between">
                <div id="areaCetak">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2 flex justify-between items-center">
                        <span>Data Transaksi Terkini</span>
                        <span id="badgeTotal" class="text-sm bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full font-bold">Total: Rp 0</span>
                    </h2>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-sm border-b">
                                    <th class="p-3 font-medium w-12 text-center">No</th>
                                    <th class="p-3 font-medium">Nama Pembayar</th>
                                    <th class="p-3 font-medium">Jumlah</th>
                                    <th class="p-3 font-medium">Keperluan</th>
                                </tr>
                            </thead>
                            <tbody id="tabelBody" class="text-gray-700 text-sm divide-y divide-gray-100">
                                <tr>
                                    <td colspan="4" class="p-8 text-center text-gray-400 italic">Menghubungkan ke database cloud...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="flex gap-2 mt-6 pt-4 border-t border-gray-100 no-print">
                    <button onclick="eksporExcel()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-3 rounded-xl transition duration-200 shadow-sm text-sm flex items-center justify-center gap-1 cursor-pointer">
                        📊 Excel
                    </button>
                    <button onclick="cetakLaporan()" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-medium py-2.5 px-3 rounded-xl transition duration-200 shadow-sm text-sm flex items-center justify-center gap-1 cursor-pointer">
                        🖨️ Print
                    </button>
                    <button onclick="hapusSemuaData()" class="bg-rose-600 hover:bg-rose-700 text-white font-medium py-2.5 px-3 rounded-xl transition duration-200 shadow-sm text-sm flex items-center justify-center gap-1 cursor-pointer" title="Kosongkan Database">
                        🗑️ Reset Data
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ GANTI DENGAN KONFIGURASI FIREBASE MILIKMU SENDIRI
        const firebaseConfig = {
  apiKey: "AIzaSyCtCpZxykL49qMZ4oqTyCbCC1X9qj6J58I",
  authDomain: "kasir-tu.firebaseapp.com",
  projectId: "kasir-tu",
  storageBucket: "kasir-tu.firebasestorage.app",
  messagingSenderId: "988740575504",
  appId: "1:988740575504:web:8367dd93c5946584098595",
  measurementId: "G-0P2PBSQ7E6"
};

        // Inisialisasi Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const koleksiTransaksi = collection(db, "transaksi_tu");

        // Array lokal untuk backup data saat export Excel
        window.dataKeuanganLokal = [];

        // 1. FUNGSI SIMPAN DATA KE CLOUD
        window.tambahDataKeCloud = async function(event) {
            event.preventDefault();
            
            const nama = document.getElementById('nama').value;
            const jumlah = parseFloat(document.getElementById('jumlah').value);
            const keperluan = document.getElementById('keperluan').value;

            try {
                // Simpan langsung ke dokumen Firestore dengan timestamp agar urut
                await addDoc(koleksiTransaksi, {
                    nama: nama,
                    jumlah: jumlah,
                    keperluan: keperluan,
                    waktu: new Date().getTime()
                });
                document.getElementById('formTransaksi').reset();
            } catch (error) {
                alert("Gagal menyimpan ke cloud: " + error.message);
            }
        }

        // 2. FUNGSI REAL-TIME LISTENER (Sinkron otomatis antar device)
        // Fungsi ini berjalan otomatis di background mendengarkan perubahan data di cloud
        const q = query(koleksiTransaksi, orderBy("waktu", "asc"));
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('tabelBody');
            const badgeTotal = document.getElementById('badgeTotal');
            
            window.dataKeuanganLokal = []; // Reset backup lokal
            let html = '';
            let totalUang = 0;
            let index = 1;

            snapshot.forEach((doc) => {
                const data = doc.data();
                totalUang += data.jumlah;

                // Simpan ke array lokal untuk keperluan export Excel
                window.dataKeuanganLokal.push({
                    "Nama Pembayar": data.nama,
                    "Jumlah Uang": data.jumlah,
                    "Keperluan": data.keperluan
                });

                html += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 text-center text-gray-400 font-medium">${index++}</td>
                        <td class="p-3 font-semibold text-gray-800">${data.nama}</td>
                        <td class="p-3 text-emerald-600 font-bold">Rp ${data.jumlah.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-gray-500">${data.keperluan}</td>
                    </tr>
                `;
            });

            if (window.dataKeuanganLokal.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400 italic">Belum ada data di cloud. Silakan input transaksi.</td></tr>`;
                badgeTotal.innerText = "Total: Rp 0";
            } else {
                tbody.innerHTML = html;
                badgeTotal.innerText = `Total: Rp ${totalUang.toLocaleString('id-ID')}`;
            }
        });

        // 3. FUNGSI RESET / HAPUS DATA KASIR (Bersihkan Cloud)
        window.hapusSemuaData = async function() {
            if (confirm("Apakah Anda yakin ingin menghapus SEMUA data dari cloud? (Pastikan sudah di-export ke Excel!)")) {
                const querySnapshot = await getDocs(koleksiTransaksi);
                querySnapshot.forEach(async (dokumen) => {
                    await deleteDoc(doc(db, "transaksi_tu", dokumen.id));
                });
            }
        }
    </script>

    <script>
        // Fungsi Eksport Excel (Mengambil dari data backup lokal hasil sinkronisasi cloud)
        function eksporExcel() {
            if (!window.dataKeuanganLokal || window.dataKeuanganLokal.length === 0) {
                alert("Belum ada data untuk diekspor!");
                return;
            }
            const worksheet = XLSX.utils.json_to_sheet(window.dataKeuanganLokal);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan TU Cloud");
            XLSX.writeFile(workbook, "Laporan_Tata_Usaha_Cloud.xlsx");
        }

        // Fungsi Cetak
        function cetakLaporan() {
            if (!window.dataKeuanganLokal || window.dataKeuanganLokal.length === 0) {
                alert("Belum ada data untuk dicetak!");
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
