<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kasir Tata Usaha</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* Style khusus untuk cetak halaman struk/laporan */
        @media print {
            body * { visibility: hidden; }
            #areaCetak, #areaCetak * { visibility: visible; }
            #areaCetak { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="bg-blue-600 text-white p-6 rounded-2xl shadow-md mb-6 text-center no-print">
            <h1 class="text-2xl font-bold tracking-wide">Sistem Penerimaan Uang Tata Usaha</h1>
            <p class="text-blue-100 text-sm mt-1">Simpan data sementara, ekspor ke Excel, dan cetak laporan langsung</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit no-print">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">Input Transaksi</h2>
                <form id="formTransaksi" onsubmit="tambahData(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nama Pembayar</label>
                        <input type="text" id="nama" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Jumlah Uang (Rp)</label>
                        <input type="number" id="jumlah" required min="1" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Keperluan / Keterangan</label>
                        <textarea id="keperluan" required rows="3" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl transition duration-200 shadow-sm cursor-pointer">
                        Simpan ke Variabel
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex flex-col justify-between">
                <div id="areaCetak">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2 flex justify-between items-center">
                        <span>Data Transaksi Hari Ini</span>
                        <span id="badgeTotal" class="text-sm bg-blue-50 text-blue-700 px-3 py-1 rounded-full font-bold">Total: Rp 0</span>
                    </h2>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-sm border-b">
                                    <th class="p-3 font-medium w-12 text-center">No</th>
                                    <th class="p-3 font-medium">Nama Pembayar</th>
                                    <th class="p-3 font-medium">Jumlah</th>
                                    <th class="p-3 font-medium">Keperluan</th>
                                </tr>
                            </thead>
                            <tbody id="tabelBody" class="text-gray-700 text-sm divide-y divide-gray-100">
                                <tr>
                                    <td colspan="4" class="p-8 text-center text-gray-400 italic">Belum ada data di dalam variabel memori.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="flex gap-4 mt-6 pt-4 border-t border-gray-100 no-print">
                    <button onclick="eksporExcel()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-xl transition duration-200 shadow-sm flex items-center justify-center gap-2 cursor-pointer">
                        📊 Export ke Excel
                    </button>
                    <button onclick="cetakLaporan()" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-medium py-2.5 px-4 rounded-xl transition duration-200 shadow-sm flex items-center justify-center gap-2 cursor-pointer">
                        🖨️ Print Laporan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variabel Array / List global untuk menyimpan data di memori browser
        let dataKeuangan = [];

        // Fungsi Tambah Data ke Variabel
        function tambahData(event) {
            event.preventDefault();

            const nama = document.getElementById('nama').value;
            const jumlah = parseFloat(document.getElementById('jumlah').value);
            const keperluan = document.getElementById('keperluan').value;

            // Masukkan object data ke dalam array variabel
            dataKeuangan.push({
                "Nama Pembayar": nama,
                "Jumlah Uang": jumlah,
                "Keperluan": keperluan
            });

            // Reset Form input
            document.getElementById('formTransaksi').reset();

            // Perbarui tampilan tabel di layar
            updateTabel();
        }

        // Fungsi Render/Update Tabel HTML
        function updateTabel() {
            const tbody = document.getElementById('tabelBody');
            const badgeTotal = document.getElementById('badgeTotal');
            
            if (dataKeuangan.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400 italic">Belum ada data di dalam variabel memori.</td></tr>`;
                badgeTotal.innerText = "Total: Rp 0";
                return;
            }

            let html = '';
            let totalUang = 0;

            dataKeuangan.forEach((data, index) => {
                totalUang += data["Jumlah Uang"];
                html += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 text-center text-gray-400 font-medium">${index + 1}</td>
                        <td class="p-3 font-semibold text-gray-800">${data["Nama Pembayar"]}</td>
                        <td class="p-3 text-emerald-600 font-bold">Rp ${data["Jumlah Uang"].toLocaleString('id-ID')}</td>
                        <td class="p-3 text-gray-500">${data["Keperluan"]}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            badgeTotal.innerText = `Total: Rp ${totalUang.toLocaleString('id-ID')}`;
        }

        // Fungsi Ekspor ke format Excel (.xlsx) menggunakan SheetJS
        function eksporExcel() {
            if (dataKeuangan.length === 0) {
                alert("Belum ada data untuk diekspor!");
                return;
            }

            // Ubah array of object menjadi worksheet Excel
            const worksheet = XLSX.utils.json_to_sheet(dataKeuangan);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan TU");

            // Download file Excel otomatis di browser
            XLSX.writeFile(workbook, "Laporan_Tata_Usaha.xlsx");
        }

        // Fungsi Print Laporan (Memanggil Print Dialog Browser)
        function cetakLaporan() {
            if (dataKeuangan.length === 0) {
                alert("Belum ada data untuk dicetak!");
                return;
            }
            // Memicu printer bawaan OS/Browser
            window.print();
        }
    </script>
</body>
</html>
